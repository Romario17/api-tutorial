<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat - API Tutorial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 2rem; }
        h1 { margin-bottom: 1rem; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        #messages { border: 1px solid #ddd; border-radius: 4px; height: 300px; overflow-y: auto; padding: 1rem; margin-bottom: 1rem; background: #fafafa; }
        .msg { padding: .3rem 0; border-bottom: 1px solid #eee; }
        .msg.sent { color: #0066cc; }
        .msg.received { color: #009933; }
        .msg.system { color: #999; font-style: italic; }
        form { display: flex; gap: .5rem; }
        input[type="text"] { flex: 1; padding: .5rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        button { padding: .5rem 1.5rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        #sendBtn { background: #0066cc; color: #fff; }
        #sendBtn:disabled { background: #aaa; }
        .controls { margin-bottom: 1rem; display: flex; gap: .5rem; align-items: center; }
        #connectBtn { background: #009933; color: #fff; }
        #disconnectBtn { background: #cc3300; color: #fff; }
        a { color: #0066cc; }
        nav { margin-bottom: 1rem; }
        #usernameInput { padding: .5rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; width: 150px; }
    </style>
</head>
<body>
    <div class="container">
        <nav><a href="/">← API</a> | <a href="/ws/test/echo">Echo</a> | <a href="/ws/test/chat">Chat</a></nav>
        <h1>💬 WebSocket Chat</h1>
        <p style="margin-bottom:1rem; color:#666;">Chat em tempo real — mensagens enviadas para todos os conectados.</p>
        <div class="controls">
            <input type="text" id="usernameInput" placeholder="Seu nome" value="Anônimo" />
            <button id="connectBtn" onclick="connect()">Conectar</button>
            <button id="disconnectBtn" onclick="disconnect()" disabled>Desconectar</button>
        </div>
        <div id="messages"></div>
        <form onsubmit="sendMessage(event)">
            <input type="text" id="msgInput" placeholder="Digite uma mensagem..." disabled />
            <button type="submit" id="sendBtn" disabled>Enviar</button>
        </form>
    </div>
    <script>
        let ws = null;
        const messagesDiv = document.getElementById("messages");
        const msgInput = document.getElementById("msgInput");
        const sendBtn = document.getElementById("sendBtn");
        const connectBtn = document.getElementById("connectBtn");
        const disconnectBtn = document.getElementById("disconnectBtn");
        const usernameInput = document.getElementById("usernameInput");

        function addMessage(text, cls) {
            const div = document.createElement("div");
            div.className = "msg " + cls;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function connect() {
            const protocol = location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${protocol}//${location.host}/ws/chat`);
            ws.onopen = () => {
                addMessage("Conectado ao chat.", "system");
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                usernameInput.disabled = true;
                msgInput.disabled = false;
                sendBtn.disabled = false;
                msgInput.focus();
            };
            ws.onmessage = (e) => addMessage(e.data, "received");
            ws.onclose = () => {
                addMessage("Desconectado do chat.", "system");
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                usernameInput.disabled = false;
                msgInput.disabled = true;
                sendBtn.disabled = true;
            };
            ws.onerror = () => addMessage("Erro na conexão.", "system");
        }

        function disconnect() { if (ws) ws.close(); }

        function sendMessage(e) {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (!text || !ws) return;
            const username = usernameInput.value.trim() || "Anônimo";
            ws.send(`${username}: ${text}`);
            msgInput.value = "";
            msgInput.focus();
        }
    </script>
</body>
</html>
