<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSocket — API Tutorial</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Bebas+Neue&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c0f0a;
  --surface: #141810;
  --border:  #252d1e;
  --sender:  #c8f53a;
  --receiver:#3af5a0;
  --red:     #f53a5a;
  --text:    #d4e8c0;
  --muted:   #5a7048;
  --mono:    'Fragment Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr;
}

/* ── Grid overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,245,58,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,245,58,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Nav ── */
.top-nav {
  position: relative;
  z-index: 1;
  padding: .5rem 2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: .65rem;
  letter-spacing: .1em;
  display: flex;
  align-items: center;
  gap: .4rem;
}
.top-nav a {
  color: var(--muted);
  text-decoration: none;
  transition: color .15s;
}
.top-nav a:hover  { color: var(--sender); }
.top-nav a.active { color: var(--sender); }

/* ── Notification bell ── */
.notif-btn {
  margin-left: auto;
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 0 .1rem;
  opacity: .35;
  transition: opacity .15s;
}
.notif-btn:hover                { opacity: 1; }
.notif-btn[data-state="granted"] { opacity: 1; }

/* ── Header ── */
header {
  position: relative;
  z-index: 1;
  padding: 1.2rem 2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 1.5rem;
  flex-wrap: wrap;
}
header h1 {
  font-family: var(--display);
  font-size: 2rem;
  letter-spacing: .08em;
  color: var(--sender);
}
header p {
  font-size: .65rem;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  line-height: 1.6;
}

/* ── Tab buttons ── */
.tabs {
  margin-left: auto;
  display: flex;
  gap: .4rem;
}
.tab-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .15em;
  padding: .45rem 1.25rem;
  cursor: pointer;
  text-transform: uppercase;
  transition: border-color .15s, color .15s, background .15s;
  position: relative;
  border-radius: 0;
}
.tab-btn:hover {
  border-color: var(--sender);
  color: var(--sender);
}
.tab-btn[aria-selected="true"] {
  border-color: var(--sender);
  color: var(--sender);
  background: rgba(200,245,58,.06);
}
.tab-btn[aria-selected="true"]::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--sender);
}

/* ── Status indicator ── */
.conn-status {
  display: flex;
  align-items: center;
  gap: .5rem;
  font-size: .6rem;
  letter-spacing: .15em;
  color: var(--muted);
  text-transform: uppercase;
  transition: color .3s;
}
.conn-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: background .3s, box-shadow .3s;
  flex-shrink: 0;
}
.conn-status.connected            { color: var(--receiver); }
.conn-status.connected .conn-dot  {
  background: var(--receiver);
  box-shadow: 0 0 8px var(--receiver);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── Main content ── */
.ws-content {
  position: relative;
  z-index: 1;
  padding: 2rem;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

/* ── Tab panels ── */
.tab-panel {
  display: none;
  flex-direction: column;
  gap: 1.25rem;
  animation: fadeIn .15s ease;
}
.tab-panel.active { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Panel header row ── */
.panel-tag {
  font-size: .58rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: .6rem;
}
.panel-tag .pill {
  padding: .15rem .6rem;
  border: 1px solid var(--sender);
  color: var(--sender);
  font-size: .55rem;
  letter-spacing: .12em;
  flex-shrink: 0;
}
.panel-tag .line { flex: 1; height: 1px; background: var(--border); }

/* ── Controls row ── */
.controls {
  display: flex;
  gap: .6rem;
  align-items: center;
  flex-wrap: wrap;
}

/* ── Messages area ── */
.messages {
  background: var(--surface);
  border: 1px solid var(--border);
  height: 320px;
  overflow-y: auto;
  padding: 1rem 1.25rem;
  display: flex;
  flex-direction: column;
  gap: .3rem;
  scroll-behavior: smooth;
}
.msg {
  font-size: .72rem;
  line-height: 1.6;
  padding: .18rem 0;
  border-bottom: 1px solid rgba(37,45,30,.5);
}
.msg.sent     { color: var(--sender); }
.msg.received { color: var(--receiver); }
.msg.system   { color: var(--muted); font-style: italic; }

/* ── Message form ── */
.msg-form {
  display: flex;
  gap: .5rem;
}

/* ── Inputs ── */
input[type="text"] {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: .75rem;
  padding: .55rem .85rem;
  outline: none;
  border-radius: 0;
  transition: border-color .15s;
  flex: 1;
  min-width: 0;
}
input[type="text"]:focus    { border-color: var(--sender); }
input[type="text"]:disabled { opacity: .35; cursor: not-allowed; }
.username-input { flex: 0 0 160px !important; }

/* ── Buttons ── */
button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .1em;
  padding: .55rem 1.2rem;
  cursor: pointer;
  text-transform: uppercase;
  transition: border-color .15s, color .15s, background .15s;
  border-radius: 0;
  white-space: nowrap;
}
button:hover:not(:disabled) {
  border-color: var(--sender);
  color: var(--sender);
}
button.primary {
  border-color: var(--sender);
  color: var(--sender);
}
button.primary:hover:not(:disabled) {
  background: rgba(200,245,58,.08);
}
button.danger {
  border-color: var(--red);
  color: var(--red);
}
button.danger:hover:not(:disabled) {
  background: rgba(245,58,90,.08);
}
button:disabled { opacity: .3; cursor: not-allowed; }

/* ── Chat layout (messages + users sidebar) ── */
.chat-layout {
  display: grid;
  grid-template-columns: 1fr 160px;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}
.chat-layout .messages {
  border: none;
  border-radius: 0;
}
.users-panel {
  background: var(--surface);
  display: flex;
  flex-direction: column;
  min-height: 320px;
  max-height: 320px;
  overflow-y: auto;
}
.users-panel-header {
  font-size: .5rem;
  letter-spacing: .2em;
  color: var(--muted);
  padding: .6rem .85rem .4rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.users-list {
  list-style: none;
  padding: .4rem 0;
  display: flex;
  flex-direction: column;
  gap: .1rem;
}
.users-list li {
  font-size: .65rem;
  padding: .25rem .85rem;
  color: var(--receiver);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.users-list li.self {
  color: var(--sender);
}
.users-list li::before {
  content: '● ';
  font-size: .45rem;
  vertical-align: middle;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  header { flex-direction: column; align-items: flex-start; }
  .tabs  { margin-left: 0; }
  .ws-content { padding: 1rem; }
  .messages   { height: 240px; }
  .chat-layout { grid-template-columns: 1fr; }
  .users-panel { min-height: 0; max-height: 120px; }
}
</style>
</head>
<body>
<script>if(!localStorage.getItem('token'))location.href='/login';</script>

<nav class="top-nav">
  <a href="/">Home</a> &nbsp;|&nbsp;
  <a href="/ws" class="active">WebSocket</a> &nbsp;|&nbsp;
  <a href="/webhooks">Webhooks</a> &nbsp;|&nbsp;
  <a href="/docs">Docs</a>
  <button class="notif-btn" id="notif-btn"
          title="Ativar notificações de chat"
          aria-label="Notificações de chat">&#x1F514;</button>
  <a href="#" id="logout-link" style="margin-left:.6rem;color:var(--red);font-size:.6rem;">Sair</a>
</nav>

<header>
  <div>
    <h1>WEBSOCKET TEST</h1>
    <p>Conexão bidirecional em tempo real</p>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab-btn"
            id="tab-echo"
            role="tab"
            aria-selected="true"
            aria-controls="panel-echo"
            onclick="switchTab('echo')">[ ECHO ]</button>
    <button class="tab-btn"
            id="tab-chat"
            role="tab"
            aria-selected="false"
            aria-controls="panel-chat"
            onclick="switchTab('chat')">[ CHAT ]</button>
  </div>
</header>

<main class="ws-content">

  <!-- ── ECHO Panel ── -->
  <section class="tab-panel active"
           id="panel-echo"
           role="tabpanel"
           aria-labelledby="tab-echo">

    <div class="panel-tag">
      <span class="pill">ECHO</span>
      <span>envia uma mensagem — recebe de volta</span>
      <span class="line"></span>
      <div class="conn-status" id="echo-status">
        <div class="conn-dot"></div>
        <span>desconectado</span>
      </div>
    </div>

    <div class="controls">
      <button class="primary" id="echo-connect-btn"    onclick="echoConnect()">Conectar</button>
      <button class="danger"  id="echo-disconnect-btn" onclick="echoDisconnect()" disabled>Desconectar</button>
    </div>

    <div class="messages" id="echo-messages"></div>

    <form class="msg-form" onsubmit="echoSend(event)" autocomplete="off">
      <input type="text" id="echo-input" placeholder="Digite uma mensagem…" disabled />
      <button type="submit" id="echo-send-btn" class="primary" disabled>Enviar</button>
    </form>

  </section>

  <!-- ── CHAT Panel ── -->
  <section class="tab-panel"
           id="panel-chat"
           role="tabpanel"
           aria-labelledby="tab-chat">

    <div class="panel-tag">
      <span class="pill">CHAT</span>
      <span>broadcast para todos os conectados</span>
      <span class="line"></span>
      <div class="conn-status" id="chat-status">
        <div class="conn-dot"></div>
        <span>desconectado</span>
      </div>
    </div>

    <div class="controls">
      <input type="text" id="chat-username" class="username-input"
             placeholder="Seu nome" value="Anônimo"
             maxlength="32" autocomplete="off" />
      <button class="primary" id="chat-connect-btn"    onclick="chatConnect()">Conectar</button>
      <button class="danger"  id="chat-disconnect-btn" onclick="chatDisconnect()" disabled>Desconectar</button>
    </div>

    <div class="chat-layout">
      <div class="messages" id="chat-messages"></div>
      <div class="users-panel" id="chat-users-panel" aria-label="Usuários online">
        <div class="users-panel-header">ONLINE</div>
        <ul class="users-list" id="chat-users-list"></ul>
      </div>
    </div>

    <form class="msg-form" onsubmit="chatSend(event)" autocomplete="off">
      <input type="text" id="chat-input" placeholder="Digite uma mensagem…" disabled />
      <button type="submit" id="chat-send-btn" class="primary" disabled>Enviar</button>
    </form>

  </section>

</main>

<script>
/* ── WebSocket state ───────────────────────────────────────────────────────── */
let echoWs = null;
let chatWs = null;

/* ── Reset UI to disconnected state ───────────────────────────────── */
// Garante estado inicial correto mesmo quando o browser restaura form state
// ao duplicar uma aba onde o usuário já estava conectado.
function resetUI() {
  document.getElementById('echo-connect-btn').disabled    = false;
  document.getElementById('echo-disconnect-btn').disabled = true;
  document.getElementById('echo-input').disabled          = true;
  document.getElementById('echo-send-btn').disabled       = true;
  setStatus('echo-status', false, 'desconectado');

  document.getElementById('chat-connect-btn').disabled    = false;
  document.getElementById('chat-disconnect-btn').disabled = true;
  document.getElementById('chat-username').disabled       = false;
  document.getElementById('chat-input').disabled          = true;
  document.getElementById('chat-send-btn').disabled       = true;
  setStatus('chat-status', false, 'desconectado');
}

/* ── Tab switching ──────────────────────────────────────────────────────────── */
function switchTab(tab) {
  ['echo', 'chat'].forEach(key => {
    const isActive = key === tab;
    document.getElementById('panel-' + key).classList.toggle('active', isActive);
    document.getElementById('tab-' + key).setAttribute('aria-selected', String(isActive));
  });
  history.replaceState(null, '', '#' + tab);

  if (tab === 'echo' && echoWs?.readyState === WebSocket.OPEN) {
    document.getElementById('echo-input').focus();
  } else if (tab === 'chat' && chatWs?.readyState === WebSocket.OPEN) {
    document.getElementById('chat-input').focus();
  }
}

/* ── Init ────────────────────────────────────────────────────────────────── */
const _isAuthenticated = !!localStorage.getItem('token') && !!localStorage.getItem('username');

document.addEventListener('DOMContentLoaded', () => {
  resetUI(); // sobrepõe qualquer estado salvo pelo browser
  const hash = location.hash.replace('#', '');
  if (hash === 'echo' || hash === 'chat') switchTab(hash);

  // Usuário autenticado: preenche username, esconde controles manuais e auto-conecta
  if (_isAuthenticated) {
    const chatUser = document.getElementById('chat-username');
    chatUser.value = localStorage.getItem('username');
    chatUser.style.display = 'none'; // username já definido pelo login
    document.getElementById('chat-connect-btn').style.display = 'none';
    document.getElementById('chat-disconnect-btn').style.display = 'none';
    chatConnect();
  }
});

/* ── Shared helpers ─────────────────────────────────────────────────────────────────── */
function addMsg(containerId, text, cls) {
  const box = document.getElementById(containerId);
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function setStatus(id, connected, label) {
  const el = document.getElementById(id);
  el.classList.toggle('connected', connected);
  el.querySelector('span').textContent = label;
}

/* ── ECHO WebSocket ──────────────────────────────────────────────────────────── */

function echoConnect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  echoWs = new WebSocket(`${proto}//${location.host}/ws/echo`);

  echoWs.onopen = () => {
    addMsg('echo-messages', 'Conectado ao servidor.', 'system');
    setStatus('echo-status', true, 'conectado');
    document.getElementById('echo-connect-btn').disabled    = true;
    document.getElementById('echo-disconnect-btn').disabled = false;
    document.getElementById('echo-input').disabled          = false;
    document.getElementById('echo-send-btn').disabled       = false;
    document.getElementById('echo-input').focus();
  };

  echoWs.onmessage = (e) => addMsg('echo-messages', e.data, 'received');

  echoWs.onclose = () => {
    addMsg('echo-messages', 'Desconectado.', 'system');
    setStatus('echo-status', false, 'desconectado');
    document.getElementById('echo-connect-btn').disabled    = false;
    document.getElementById('echo-disconnect-btn').disabled = true;
    document.getElementById('echo-input').disabled          = true;
    document.getElementById('echo-send-btn').disabled       = true;
    echoWs = null;
  };

  echoWs.onerror = () => addMsg('echo-messages', 'Erro na conexão.', 'system');
}

function echoDisconnect() { if (echoWs) echoWs.close(); }

function echoSend(e) {
  e.preventDefault();
  const input = document.getElementById('echo-input');
  const text  = input.value.trim();
  if (!text || !echoWs || echoWs.readyState !== WebSocket.OPEN) return;
  addMsg('echo-messages', 'Você: ' + text, 'sent');
  echoWs.send(text);
  input.value = '';
  input.focus();
}

/* ── CHAT WebSocket ──────────────────────────────────────────────────────────── */
let chatUsername = '';

// Atualiza o painel lateral com a lista de usuários online
function renderUsers(users) {
  const list = document.getElementById('chat-users-list');
  list.innerHTML = '';
  users.forEach(u => {
    const li = document.createElement('li');
    li.textContent = u;
    if (u === chatUsername) li.classList.add('self');
    list.appendChild(li);
  });
}

// Renderiza payload JSON recebido do servidor
function renderChatMsg(payload) {
  const { type, username, text, users, ts } = payload;
  if (type === 'message') {
    const isSelf = username === chatUsername;
    const label  = isSelf ? `Você [• ${ts}]` : `${username} [${ts}]`;
    addMsg('chat-messages', `${label}: ${text}`, isSelf ? 'sent' : 'received');
  } else {
    // join / leave
    addMsg('chat-messages', `▶ ${text}`, 'system');
  }
  if (users) renderUsers(users);
}

function chatConnect() {
  const proto         = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const usernameInput = document.getElementById('chat-username');
  // Username definido UMA VEZ na conexão — query param registrado no servidor
  chatUsername = usernameInput.value.trim() || 'Anônimo';
  const url = `${proto}//${location.host}/ws/chat?username=${encodeURIComponent(chatUsername)}`;
  chatWs = new WebSocket(url);

  chatWs.onopen = async () => {
    setStatus('chat-status', true, chatUsername);
    document.getElementById('chat-connect-btn').disabled    = true;
    document.getElementById('chat-disconnect-btn').disabled = false;
    usernameInput.disabled                                  = true;
    document.getElementById('chat-input').disabled          = false;
    document.getElementById('chat-send-btn').disabled       = false;
    document.getElementById('chat-input').focus();

    // Carrega histórico de mensagens do banco
    try {
      const token = localStorage.getItem('token');
      const resp = await fetch('/ws/chat/history?limit=50', {
        headers: token ? { 'Authorization': 'Bearer ' + token } : {}
      });
      if (resp.ok) {
        const messages = await resp.json();
        messages.forEach(m => {
          const isSelf = m.username === chatUsername;
          const label  = isSelf ? `Você [• ${m.timestamp}]` : `${m.username} [${m.timestamp}]`;
          addMsg('chat-messages', `${label}: ${m.text}`, isSelf ? 'sent' : 'received');
        });
        if (messages.length > 0) {
          addMsg('chat-messages', '——— mensagens anteriores ———', 'system');
        }
      }
    } catch { /* histórico indisponível — silencioso */ }
  };

  chatWs.onmessage = (e) => {
    try { renderChatMsg(JSON.parse(e.data)); }
    catch { addMsg('chat-messages', e.data, 'received'); }
  };

  chatWs.onclose = () => {
    setStatus('chat-status', false, 'reconectando…');
    document.getElementById('chat-input').disabled  = true;
    document.getElementById('chat-send-btn').disabled = true;
    chatWs = null;

    // Auto-reconecta se o usuário está autenticado
    if (_isAuthenticated) {
      addMsg('chat-messages', 'Conexão perdida. Reconectando…', 'system');
      setTimeout(() => chatConnect(), 2000);
    } else {
      addMsg('chat-messages', 'Desconectado do chat.', 'system');
      setStatus('chat-status', false, 'desconectado');
      document.getElementById('chat-connect-btn').disabled    = false;
      document.getElementById('chat-disconnect-btn').disabled = true;
      usernameInput.disabled                                  = false;
      renderUsers([]);
      chatUsername = '';
    }
  };

  chatWs.onerror = () => addMsg('chat-messages', 'Erro na conexão.', 'system');
}

function chatDisconnect() { if (chatWs) chatWs.close(); }

function chatSend(e) {
  e.preventDefault();
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  // Apenas o texto — username já está registrado no servidor via query param
  if (!text || !chatWs || chatWs.readyState !== WebSocket.OPEN) return;
  chatWs.send(text);
  input.value = '';
  input.focus();
}
</script>

<script>
/* ── Chat notifications via SSE ─────────────────────────────────── */
(function () {
  if (!('Notification' in window) || !window.EventSource) return;

  let es = null;
  let reconnectDelay = 1000;

  function showDeniedBanner() {
    if (document.getElementById('notif-denied-banner')) return;
    const isFirefox = navigator.userAgent.includes('Firefox');
    const isChrome  = navigator.userAgent.includes('Chrome');
    const instruction = isFirefox
      ? 'Clique no ícone de cadeado na barra de endereço → Permissões → Notificações → Permitir.'
      : isChrome
      ? 'Clique no ícone de cadeado na barra de endereço → Configurações do site → Notificações → Permitir.'
      : 'Acesse as configurações do site no seu browser e permita notificações para esta página.';
    const b = document.createElement('div');
    b.id = 'notif-denied-banner';
    b.setAttribute('role', 'alert');
    b.style.cssText = 'position:fixed;bottom:1rem;right:1rem;z-index:9999;'
      + 'background:#1a1a0e;border:1px solid #c0392b;color:#e8e8d0;'
      + 'font-family:monospace;font-size:.78rem;padding:.75rem 1rem;'
      + 'max-width:320px;line-height:1.5;box-shadow:0 0 12px rgba(192,57,43,.4);';
    b.innerHTML = '<strong style="color:#c0392b">\uD83D\uDD15 Notificações bloqueadas</strong><br>'
      + '<span style="color:#a0a080">' + instruction + '</span><br>'
      + '<button onclick="this.parentElement.remove()" style="margin-top:.5rem;background:transparent;'
      + 'border:1px solid #555;color:#a0a080;font-family:monospace;cursor:pointer;padding:.2rem .5rem">fechar</button>';
    document.body.appendChild(b);
    setTimeout(() => b?.remove(), 12000);
  }

  function onChatMessage(e) {
    if (Notification.permission !== 'granted') return;
    // Suprime se o usuário está nesta aba com foco — já vê as mensagens
    if (document.visibilityState === 'visible') return;
    try {
      const { username, text, ts } = JSON.parse(e.data);
      const n = new Notification('\u{1F4AC} ' + username + ' [' + ts + ']', {
        body: text, tag: 'chat-msg', renotify: true, silent: false,
      });
      n.onclick = () => { window.focus(); n.close(); };
    } catch {}
  }

  function startSSE() {
    // Não cria nova conexão se já há uma aberta ou conectando
    if (es && es.readyState !== EventSource.CLOSED) return;
    es = new EventSource('/sse/notifications');
    es.addEventListener('chat-message', onChatMessage);
    es.onopen  = () => { reconnectDelay = 1000; };
    es.onerror = () => {
      es.close(); es = null;
      setTimeout(startSSE, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };
  }

  function applyPermission(perm) {
    const btn = document.getElementById('notif-btn');
    if (!btn) return;
    if (perm === 'granted') {
      btn.innerHTML = '&#x1F514;'; btn.title = 'Notificações ativadas';
      btn.dataset.state = 'granted'; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
    } else if (perm === 'denied') {
      btn.innerHTML = '&#x1F515;'; btn.title = 'Notificações bloqueadas — clique para ver como resolver';
      btn.dataset.state = 'denied'; btn.style.opacity = '0.5'; btn.style.cursor = 'help';
    } else {
      btn.innerHTML = '&#x1F514;'; btn.title = 'Clique para ativar notificações de chat';
      btn.dataset.state = 'default'; btn.style.opacity = '0.35'; btn.style.cursor = 'pointer';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    // SSE conecta imediatamente — a permissão decide se a notificação é exibida
    startSSE();
    applyPermission(Notification.permission);
    document.getElementById('notif-btn')?.addEventListener('click', async () => {
      const btn = document.getElementById('notif-btn');
      if (btn.dataset.state === 'denied') { showDeniedBanner(); return; }
      if (Notification.permission === 'granted') return;
      applyPermission(await Notification.requestPermission());
    });
  });
})();
</script>
<script>
document.getElementById('logout-link')?.addEventListener('click', e => {
  e.preventDefault();
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  location.href = '/login';
});
</script>
</body>
